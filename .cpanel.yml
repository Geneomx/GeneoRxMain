---
# genecisu: repo at /home/genecisu/repositories/GeneoRxMain
# Deploy path in cPanel must match. Syncs web files → /home/genecisu/public_html
deployment:
  tasks:
    - export DEPLOYPATH=$DEPLOYPATH
    - export CPANEL_USER=genecisu
    - export APP_DIR=/home/genecisu/repositories/GeneoRxMain
    - export SYNC_PUBLIC_HTML=1
    - /bin/bash $DEPLOYPATH/scripts/deploy-cpanel.sh
