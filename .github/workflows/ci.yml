name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Laravel backend tests ──────────────────────────────────────────────────
  laravel:
    name: Laravel tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.2', '8.3']

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@2.37.1
        with:
          php-version: ${{ matrix.php }}
          extensions: sqlite3, pdo_sqlite, mbstring, fileinfo
          coverage: none
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Create SQLite database
        run: touch database/database.sqlite

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run PHP tests
        run: php artisan test --stop-on-failure

  # ── Laravel code style ─────────────────────────────────────────────────────
  pint:
    name: PHP code style (Pint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@2.37.1
        with:
          php-version: '8.3'
          coverage: none
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: composer install --no-interaction --prefer-dist
      - run: ./vendor/bin/pint --test

  # ── Mobile TypeScript checks ───────────────────────────────────────────────
  mobile:
    name: Mobile TypeScript check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Expo doctor
        run: npx expo-doctor || true
