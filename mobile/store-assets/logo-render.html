<!DOCTYPE html>
<html>
<head>

<style>

</head>
<body>

    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">

        <radialGradient id="sphere1" cx="35%" cy="30%" r="75%">
          <stop offset="0%"   stop-color="#7DD3C0"/>
