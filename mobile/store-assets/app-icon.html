<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 512px;
    height: 512px;
    overflow: hidden;
    background: #0E7C66;
  }
  .icon {
    width: 512px;
    height: 512px;
    position: relative;
    background: radial-gradient(circle at 35% 30%, #3FB39A 0%, #0E7C66 50%, #053D33 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 0;
  }
  svg {
    width: 340px;
    height: 340px;
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.35));
  }
</style>
</head>
<body>
<div class="icon">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
    <defs>
      <radialGradient id="sphere1" cx="35%" cy="30%" r="75%">
        <stop offset="0%"   stop-color="#A8E8DC"/>
        <stop offset="55%"  stop-color="#3FC4AC"/>
        <stop offset="100%" stop-color="#0A5145"/>
      </radialGradient>
      <radialGradient id="sphere2" cx="35%" cy="30%" r="75%">
        <stop offset="0%"   stop-color="#C0EDE4"/>
        <stop offset="55%"  stop-color="#4DD4BC"/>
        <stop offset="100%" stop-color="#0E6B5A"/>
      </radialGradient>
      <radialGradient id="sphere3" cx="35%" cy="30%" r="75%">
        <stop offset="0%"   stop-color="#8FD8CA"/>
        <stop offset="55%"  stop-color="#28A898"/>
        <stop offset="100%" stop-color="#073D34"/>
      </radialGradient>
      <radialGradient id="sphere4" cx="35%" cy="30%" r="75%">
        <stop offset="0%"   stop-color="#B4E6DC"/>
        <stop offset="55%"  stop-color="#38BCA8"/>
        <stop offset="100%" stop-color="#0B5A4D"/>
      </radialGradient>
      <linearGradient id="link" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%"   stop-color="rgba(255,255,255,0.30)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0.10)"/>
      </linearGradient>
    </defs>

    <!-- Connecting bonds -->
    <path d="M 65 70 Q 90 95 110 100" stroke="url(#link)" stroke-width="22" stroke-linecap="round" fill="none"/>
    <path d="M 110 100 Q 130 105 150 75" stroke="url(#link)" stroke-width="22" stroke-linecap="round" fill="none"/>
    <path d="M 110 100 Q 130 115 150 145" stroke="url(#link)" stroke-width="22" stroke-linecap="round" fill="none"/>
    <path d="M 110 100 Q 85 110 65 140" stroke="url(#link)" stroke-width="22" stroke-linecap="round" fill="none"/>

    <!-- Central hub -->
    <circle cx="110" cy="100" r="22" fill="url(#sphere3)"/>

    <!-- Four outer spheres -->
    <circle cx="65"  cy="70"  r="28" fill="url(#sphere1)"/>
    <circle cx="150" cy="75"  r="32" fill="url(#sphere2)"/>
    <circle cx="65"  cy="140" r="28" fill="url(#sphere3)"/>
    <circle cx="150" cy="145" r="28" fill="url(#sphere4)"/>

    <!-- Highlight glints -->
    <ellipse cx="58"  cy="62"  rx="6"  ry="4"  fill="rgba(255,255,255,0.65)"/>
    <ellipse cx="142" cy="66"  rx="7"  ry="5"  fill="rgba(255,255,255,0.65)"/>
    <ellipse cx="58"  cy="132" rx="6"  ry="4"  fill="rgba(255,255,255,0.55)"/>
    <ellipse cx="143" cy="137" rx="6"  ry="4"  fill="rgba(255,255,255,0.60)"/>
    <ellipse cx="105" cy="94"  rx="4"  ry="3"  fill="rgba(255,255,255,0.55)"/>
  </svg>
</div>
</body>
</html>
